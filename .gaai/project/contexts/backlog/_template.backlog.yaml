# Backlog Item Template
# Copy this template to create a new backlog entry.
# Place completed items in done/YYYY-MM.done.yaml

- id: E00S00                                  # Epic + Story ID (e.g. E01S03)
  epic: E00                                   # Parent Epic ID
  title: "Story title"                        # One sentence, action-oriented
  priority: high | medium | low
  status: draft | refined | in_progress | done | failed | blocked
  artefact: contexts/artefacts/stories/E00S00.story.md   # Path to Story artefact
  dependencies: []                            # IDs of stories this depends on
  created_at: YYYY-MM-DD
  updated_at: YYYY-MM-DD
