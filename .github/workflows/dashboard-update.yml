name: Update Dashboard data

on:
  schedule:
    # Run weekdays at 23:00 UTC — after gdpnow-update (21:00) and regime-update (22:00)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests yfinance pandas openpyxl

      - name: Update dashboard
        run: python update_dashboard.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prototypes/index.html
          if git diff --cached --quiet; then
            echo "No changes to index.html — skipping commit"
          else
            git commit -m "data(dashboard): daily update $(date -u +%Y-%m-%d)"
            git push
          fi
